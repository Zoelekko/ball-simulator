// IRIDESCENT HELPERS

// hue shifts over time — call with frame to get a live rainbow gradient
function iridGrad(ctx, x1, y1, x2, y2, t, alpha=1) {
  const g = ctx.createLinearGradient(x1, y1, x2, y2);
  const stops = 7;
  for(let i=0;i<=stops;i++){
    const h = ((t*0.8 + i*(360/stops)) % 360);
    g.addColorStop(i/stops, `hsla(${h},100%,72%,${alpha})`);
  }
  return g;
}
// Solid iridescent color at a point in time
function iridColor(t, sat=100, light=72, alpha=1) {
  return `hsla(${(t*0.8)%360},${sat}%,${light}%,${alpha})`;
}

  let killCount = 0;

  const MUSIC_VOL_MAX  = 0.80;
  const MUSIC_KILL_STEP = 0.055;   // volume step per kill
  const MUSIC_ORB_STEP  = 0.025;   // half step on orb pickup

  // All music files in music/ folder
  const MUSIC_FILES = [
    'music/SpotiDown.App - BACK_ - c152.mp3',
    'music/SpotiDown.App - Bad Habits - c152.mp3',
    'music/SpotiDown.App - DRIFT - PHXNK MXCH_NE.mp3',
    'music/SpotiDown.App - Drift Anthem - c152.mp3',
    'music/SpotiDown.App - Lost Soul - mislaid.mp3',
    'music/SpotiDown.App - NEON - mislaid.mp3',
    'music/SpotiDown.App - PHONK DXNCE 2 - c152.mp3',
    'music/SpotiDown.App - REAL G - c152.mp3',
    'music/SpotiDown.App - assault - mislaid.mp3',
    'music/SpotiDown.App - starly - mislaid.mp3',
  ];

  let musicSrc = null;   // BufferSourceNode (http mode)
  let musicGainNode = null;
  let musicReadyResolve = null;
  let musicReady = new Promise(r => { musicReadyResolve = r; });

  async function loadAndPlayMusic() {
    if(musicSrc){ try{ musicSrc.stop(); }catch(e){} musicSrc=null; }

    // Always use AudioContext (http or file:// — works from local server)
    if(!ctx) return;
    const raw = MUSIC_FILES[Math.floor(Math.random()*MUSIC_FILES.length)];
    try {
      const resp = await fetch(raw);
      if(!resp.ok) throw new Error(`HTTP ${resp.status}: ${raw}`);
      const ab = await resp.arrayBuffer();
      const buf = await ctx.decodeAudioData(ab);
      musicGainNode = ctx.createGain();
      musicGainNode.gain.value = MUSIC_VOL_BASE;
      musicGainNode.connect(ctx.destination);
      musicGainNode.connect(dest); // CRITICAL: routes into MediaRecorder
      musicSrc = ctx.createBufferSource();
      musicSrc.buffer = buf; musicSrc.loop = true;
      musicSrc.connect(musicGainNode);
      // Start at second 10 so the beat is already going from frame 1
      const startOffset = Math.min(10, buf.duration * 0.2);
      musicSrc.start(0, startOffset);
      if(musicReadyResolve){ musicReadyResolve(); musicReadyResolve=null; }
      console.log('Music loaded:', raw);
    } catch(e){
      console.warn('Music load failed:', e);
      if(musicReadyResolve){ musicReadyResolve(); musicReadyResolve=null; }
    }
  }

  function stopMusic() {
    if(musicSrc){ try{ musicSrc.stop(); }catch(e){} musicSrc=null; }
    if(musicGainNode && ctx){
      musicGainNode.gain.setTargetAtTime(0, ctx.currentTime, 0.3);
    }
  }

  function resetMusicVolume() {
    killCount = 0;
    if(musicGainNode && ctx){
      musicGainNode.gain.cancelScheduledValues(ctx.currentTime);
      musicGainNode.gain.setTargetAtTime(MUSIC_VOL_BASE, ctx.currentTime, 0.8);
    }
  }

  function onKill() {
    killCount++;
    if(!musicGainNode || !ctx) return;
    const cur = musicGainNode.gain.value;
    const next = Math.min(MUSIC_VOL_MAX, cur + MUSIC_KILL_STEP);
    musicGainNode.gain.cancelScheduledValues(ctx.currentTime);
    musicGainNode.gain.setValueAtTime(cur, ctx.currentTime);
    musicGainNode.gain.linearRampToValueAtTime(next, ctx.currentTime + 0.15);
  }

  function onOrbPickup() {
    if(!musicGainNode || !ctx) return;
    const cur = musicGainNode.gain.value;
    const next = Math.min(MUSIC_VOL_MAX, cur + MUSIC_ORB_STEP);
    musicGainNode.gain.cancelScheduledValues(ctx.currentTime);
    musicGainNode.gain.setValueAtTime(cur, ctx.currentTime);
    musicGainNode.gain.linearRampToValueAtTime(next, ctx.currentTime + 0.1);
  }

  async function create() {
    ctx  = new AudioContext();
    dest = ctx.createMediaStreamDestination();
    // Silence node: keeps audio track alive in MediaRecorder from frame 0
    const silBuf = ctx.createBuffer(1, ctx.sampleRate, ctx.sampleRate);
    const silSrc = ctx.createBufferSource();
    silSrc.buffer = silBuf; silSrc.loop = true;
    const silG = ctx.createGain(); silG.gain.value = 0;
    silSrc.connect(silG); silG.connect(dest); silSrc.start();
    killCount = 0;
    musicReady = new Promise(r => { musicReadyResolve = r; });
    await loadAndPlayMusic();
  }

  function tone(freq, dur, type='sine', vol=0.15) {
    if (!ctx || ctx.state==='closed') return;
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.type=type; o.frequency.value=freq;
    g.gain.setValueAtTime(vol, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime+dur);
    o.connect(g); g.connect(ctx.destination); g.connect(dest);
    o.start(); o.stop(ctx.currentTime+dur);
  }
  return {

    stream() { return dest?.stream ?? null; },
    stopMusic,
    resetMusicVolume,
    onKill,
    onOrbPickup,

// null = random, 'solo' = force individual, 'team' = force team
let forcedMode = null;
// For auto batch: pre-shuffled sequence guaranteeing ≥3 solo and ≥3 team in 10
let autoBatchSequence = [];
function buildBatchSequence(){
  // 10 slots: at least 3 solo + 3 team, rest random
  const slots = ['solo','solo','solo','team','team','team'];
  while(slots.length < AUTO_BATCH_MAX) slots.push(Math.random()<0.5?'solo':'team');
  // shuffle
  for(let i=slots.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [slots[i],slots[j]]=[slots[j],slots[i]];
  }
  return slots;
}

const Rec = (() => {
  let mr=null, chunks=[];
  function pickMime() {
    return ['video/mp4;codecs=avc1.42E01E,mp4a.40.2','video/mp4;codecs=avc1,mp4a.40.2',
            'video/mp4','video/webm;codecs=vp9,opus','video/webm;codecs=vp8,opus','video/webm']
           .find(m=>MediaRecorder.isTypeSupported(m)) ?? '';
  }
  function start() {
    if (mr&&mr.state!=='inactive') mr.stop();
    chunks=[];
    const mime=pickMime();
    const tracks=[...RC.captureStream(60).getTracks(),...(Snd.stream()?.getTracks()??[])];
    const opts={videoBitsPerSecond:2_500_000};
    if(mime) opts.mimeType=mime;
    mr=new MediaRecorder(new MediaStream(tracks),opts);
    mr.ondataavailable=e=>e.data.size>0&&chunks.push(e.data);
    mr.onstop=()=>{
      const isMP4=(mr.mimeType||mime).includes('mp4'), ext=isMP4?'mp4':'webm';
      const blob=new Blob(chunks,{type:mr.mimeType||mime||'video/webm'});
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');
      a.href=url;
      a.download=`grabaciones/Arena Ball Anime - Part ${autoBatchPart}.${ext}`;
      a.click();
      setTimeout(()=>URL.revokeObjectURL(url),15000);
      const sizeMB=(blob.size/1024/1024).toFixed(1);
      if(autoBatchActive && autoBatchPart < AUTO_BATCH_MAX){
        setStatus('done',`✓ Part ${autoBatchPart} (${sizeMB}MB) — iniciando Part ${autoBatchPart+1}...`);
        setTimeout(()=>{ begin(); },2500);
      } else {
        autoBatchActive=false;
        setStatus('done',`✓ Listo — ${autoBatchPart} partidas grabadas (${sizeMB}MB última)`);
        soloBtn.disabled=false; teamBtn.disabled=false; autoBtn.disabled=false; restartBtn.disabled=false;
      }
    };
    mr.start(200);
    setStatus('rec',`● REC — Part ${autoBatchPart} / ${AUTO_BATCH_MAX}`);
  }
  function stop() { if(mr&&mr.state!=='inactive') mr.stop(); }
  return { start, stop };
})();

const parts = [];
function burst(x, y, color, n=16) {
  for(let i=0;i<n;i++){
    const a=Math.PI*2/n*i+Math.random()*0.3, s=3+Math.random()*6;
    parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,r:3+Math.random()*5,color,life:55,max:55});
  }
}
// Ring burst for rank-up event
function ringBurst(x, y, color) {
  for(let i=0;i<8;i++){
    const a=Math.PI*2/8*i;
    parts.push({x,y,vx:Math.cos(a)*4,vy:Math.sin(a)*4,r:4,color,life:25,max:25});
  }
}
function tickParts(){
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i];
    p.x+=p.vx; p.y+=p.vy; p.vx*=0.90; p.vy*=0.90;
    if(--p.life<=0) parts.splice(i,1);
  }
}

function spawnOrb(){
  const type=ORB_TYPES[Math.floor(Math.random()*ORB_TYPES.length)];
  // Random position inside arena
  const angle=Math.random()*Math.PI*2;
  const dist=Math.random()*(AR-ORB_RADIUS*3);
  orbs.push({
    type, x:ACX+Math.cos(angle)*dist, y:ACY+Math.sin(angle)*dist,
    life:ORB_LIFETIME, max:ORB_LIFETIME,
    pulse:Math.random()*Math.PI*2,  // phase offset for pulse animation
  });
}

// CINEMATIC MOMENT
// ════════════════════════════════════════════════
const CAM = {
  // Phases: 'off' | 'pickup' | 'follow' | 'impact' | 'fadeout'
  phase: 'off',
  timer: 0,
  // Focus point (lerped smoothly each frame)
  focX: ACX, focY: ACY,
  // Target focus (where we want to look)
  tgtX: ACX, tgtY: ACY,
  zoom: 1.0, tgtZoom: 1.0,
  // Orb info
  ballId: -1, ballColor:'#fff',
  orbName:'', orbDesc:'', orbEmoji:'', orbColor:'#fff', orbChar:'',
  splashLines: [], // cached speed lines so they don't flicker
  totalTimer: 0,  // global cam lifetime — hard killed after max
  // Follow subject (ball id or fixed point)
  followBallId: -1,
  followX: ACX, followY: ACY,
  // Card visible
  showCard: false,
  // Impact flash
  impactColor:'#fff', impactAlpha:0,
  // Result text
  resultText:'', resultTimer:0,

  trigger(ball, type){
    this.phase='pickup'; this.timer=0;
    this.focX=ball.x; this.focY=ball.y;
    this.tgtX=ball.x; this.tgtY=ball.y;
    // Wide-shot abilities: zoom out to show the whole arena
    const wideAbils=['timestop','gojo_red','dimension_cut','mahoraga','sand_tsunami','black_storm','tornado_psy','arena_split','arena_shrink','chaos'];
    this.wideShot=wideAbils.includes(type.id);
    this.zoom=1.0; this.tgtZoom=this.wideShot ? 1.15 : 2.4;
    this.ballId=ball.id; this.ballColor=ball.color;
    this.orbName=type.name; this.orbDesc=type.desc;
    this.orbEmoji=type.emoji; this.orbColor=type.color; this.orbChar=type.char??'';
    // Pre-generate speed lines so they're stable across frames
    this.splashLines=[];
    for(let i=0;i<44;i++){
      this.splashLines.push({
        ang: (Math.PI*2/44)*i + (Math.random()-0.5)*0.08,
        inner: 80+Math.random()*60,
        outer: 480+Math.random()*220,
        lw: 0.5+Math.random()*3.5,
      });
    }
    this.followBallId=ball.id;
    this.followX=ball.x; this.followY=ball.y;
    this.showCard=false; this.totalTimer=0;
    this.resultText=''; this.resultTimer=0; this.impactAlpha=0;
    // Abilities that have projectiles/targets — transition to follow phase after pickup
    const projAbils=['gojo_blue','gojo_red','gojo_purple','toji_chain','ekko_ult','timestop','rewind','prison','portal','sandevistan'];
    this.hasFollow=projAbils.includes(type.id);
  },

  setFollow(x,y,ballId=-1){ this.followX=x; this.followY=y; this.followBallId=ballId; },

  impact(x,y,color,text='HIT!',targetBallId=-1){
    if(this.phase==='off') return; // don't reactivate after cam ended
    this.impactColor=color; this.impactAlpha=1;
    this.resultText=text; this.resultTimer=70;
    this.tgtX=x; this.tgtY=y;
    // Wide-shot abilities stay zoomed out even at impact
    this.tgtZoom=this.wideShot ? 1.2 : 2.8;
    // Follow the hit target ball dynamically during impact
    if(targetBallId>=0){ this.followBallId=targetBallId; }
    if(this.phase==='follow'||this.phase==='pickup') this.phase='impact';
  },

  physSpeed(){
    if(this.phase==='off') return 1;
    if(this.phase==='pickup') return 0.35;
    if(this.phase==='follow') return 0.45;
    if(this.phase==='impact') return 0.25;
    if(this.phase==='fadeout') return 0.6+(this.timer/40)*0.4;
    return 1;
  },

  tick(balls){
    if(this.phase==='off') return;
    this.timer++;

    // Hard safety timeout — if cam has been active >6s total, force off
    this.totalTimer++;
    if(this.totalTimer > 360){ this.phase='off'; this.zoom=1.0; this.focX=ACX; this.focY=ACY; return; }

    // Update follow target — if ball died, cut to fadeout
    if(this.followBallId>=0){
      const fb=balls.find(b=>b.id===this.followBallId&&b.alive);
      if(fb){ this.followX=fb.x; this.followY=fb.y; }
      else if(this.phase==='follow'||this.phase==='pickup'){ this.phase='fadeout'; this.timer=0; }
    }

    // Smooth lerp focus & zoom toward target
    const lspd= this.phase==='pickup'?0.18: this.phase==='impact'?0.22:0.10;
    this.focX+=(this.tgtX-this.focX)*lspd;
    this.focY+=(this.tgtY-this.focY)*lspd;
    this.zoom+=(this.tgtZoom-this.zoom)*0.12;

    // Impact flash decay
    if(this.impactAlpha>0) this.impactAlpha=Math.max(0,this.impactAlpha-0.045);
    if(this.resultTimer>0) this.resultTimer--;

    // Phase transitions
    if(this.phase==='pickup'){
      this.tgtX=this.followX; this.tgtY=this.followY;
      if(this.timer===8) this.showCard=true;
      if(this.timer>70){ // ~1.15s — splash fully visible before transitioning
        this.showCard=false;
        this.phase= this.hasFollow?'follow':'fadeout';
        this.timer=0; this.tgtZoom=this.wideShot ? 1.15 : 1.9;
      }
    }
    else if(this.phase==='follow'){
      this.tgtX=this.followX; this.tgtY=this.followY;
      if(this.timer>130){ this.phase='fadeout'; this.timer=0; } // ~2.2s max
    }
    else if(this.phase==='impact'){
      // Keep tracking the target ball during impact
      if(this.followBallId>=0){
        const fb=balls.find(b=>b.id===this.followBallId&&b.alive);
        if(fb){ this.tgtX=fb.x; this.tgtY=fb.y; }
      }
      if(this.timer>70){ this.phase='fadeout'; this.timer=0; } // 1.2s at impact
    }
    else if(this.phase==='fadeout'){
      this.tgtX=ACX; this.tgtY=ACY; this.tgtZoom=1.0;
      if(this.timer>40){ this.phase='off'; this.zoom=1.0; this.focX=ACX; this.focY=ACY; }
    }
  },

  get active(){ return this.phase!=='off'; },
};

function tickOrbs(balls){
  orbSpawnTimer++;
  orbRoundFrame++;
  stallOrbTimer++;
  // 2.5s no damage → flood with orbs
  if(stallOrbTimer >= ORB_STALL_TRIGGER && !stallOrbActive){
    stallOrbActive = true;
    spawnOrb(); spawnOrb();
  }
  // 6s no damage → force-apply a random ability directly on every alive ball
  if(stallOrbTimer === ORB_FORCE_TRIGGER){
    stallOrbTimer = ORB_STALL_TRIGGER; // reset to keep flood mode active after
    stallOrbCycle++;
    for(const b of balls){
      if(!b.alive) continue;
      const type = ORB_TYPES[Math.floor(Math.random()*ORB_TYPES.length)];
      Snd.orbPickup(type.id);
      applyOrb(type, b);
      G.arenaFlash.color = type.color; G.arenaFlash.alpha = 0.4;
      burst(b.x, b.y, type.color, 20);
    }
    // On 2nd+ cycle (12s+ no death): also randomize velocities to unstick everyone
    if(stallOrbCycle >= 2){
      for(const b of balls){
        if(!b.alive) continue;
        const spd = C.MIN_SPD*2 + Math.random()*(C.MAX_SPD-C.MIN_SPD)*1.8;
        const ang = Math.random()*Math.PI*2;
        b.vx = Math.cos(ang)*spd; b.vy = Math.sin(ang)*spd;
      }
      G.arenaFlash.color='#ffffff'; G.arenaFlash.alpha=0.7;
      G.shakeFrames=40; G.shakeAmt=28;
    }
  }
  const spawnInterval = stallOrbActive ? ORB_STALL_RATE
    : orbRoundFrame < ORB_BURST_FRAMES ? ORB_SPAWN_FAST : ORB_SPAWN_INTERVAL;
  if(orbSpawnTimer>=spawnInterval){ orbSpawnTimer=0; spawnOrb(); }

  for(let i=orbs.length-1;i>=0;i--){
    const o=orbs[i];
    o.life--;
    o.pulse+=0.08;
    if(o.life<=0){ orbs.splice(i,1); continue; }

    // Check collision with each alive ball
    for(const b of balls){
      if(!b.alive) continue;
      const dx=b.x-o.x, dy=b.y-o.y;
      if(Math.hypot(dx,dy)<b.r+ORB_RADIUS){
        applyOrb(b, o.type);
        // Pickup burst
        burst(o.x, o.y, o.type.color, 20);
        orbs.splice(i,1);
        break;
      }
    }
  }
}

function applyOrb(ball, type){
  CAM.trigger(ball, type);
  Snd.orbPickup(type.id);
  Snd.onOrbPickup();
  switch(type.id){
    case 'gojo_blue':
      // Pull all others toward ball — camera follows the nearest pulled enemy
      { const angle=Math.random()*Math.PI*2;
        FX.chains.push({x1:ball.x,y1:ball.y,
          x2:ball.x+Math.cos(angle)*AR,y2:ball.y+Math.sin(angle)*AR,
          life:40,max:40,ownerId:ball.id,targetId:-1,type:'blue_pull'});
        let closestTarget=null, closestDist=Infinity;
        G.balls.forEach(b=>{ if(b.alive&&isEnemy(ball,b)){
          const dx=ball.x-b.x,dy=ball.y-b.y,d=Math.hypot(dx,dy)||1;
          b.vx+=dx/d*8; b.vy+=dy/d*8;
          if(d<closestDist){ closestDist=d; closestTarget=b; }
        }});
        burst(ball.x,ball.y,'#0044ff',24);
        G.arenaFlash.color='#001aff'; G.arenaFlash.alpha=0.3;
        if(closestTarget){
          CAM.setFollow(closestTarget.x, closestTarget.y, closestTarget.id);
          const tid=closestTarget.id;
          setTimeout(()=>{ const bt=G.balls.find(b=>b.id===tid); if(bt) CAM.impact(bt.x,bt.y,'#0044ff','PULLED!',tid); },400);
        }
      } break;

    case 'gojo_red':
      // Explosive repulsion — camera focuses on the explosion center
      { let hitCount=0;
        G.balls.forEach(b=>{ if(b.alive&&isEnemy(ball,b)){
          const dx=b.x-ball.x,dy=b.y-ball.y,d=Math.hypot(dx,dy)||1;
          b.vx+=dx/d*16; b.vy+=dy/d*16;
          b.hit(); hitCount++;
        }});
        FX.explosions.push({x:ball.x,y:ball.y,r:0,maxR:160,life:25,max:25,color:'#ff2244'});
        burst(ball.x,ball.y,'#ff0022',32);
        G.shakeFrames=30; G.shakeAmt=22;
        G.arenaFlash.color='#ff0000'; G.arenaFlash.alpha=0.5;
        CAM.setFollow(ball.x, ball.y);
        setTimeout(()=>CAM.impact(ball.x,ball.y,'#ff2244', hitCount>0?'REPULSE!':'MISS!'),250);
      } break;

    case 'gojo_purple':
      // Void beam — camera follows along the beam direction
      { const angle=Math.random()*Math.PI*2;
        const beamLen=AR*2.2;
        const beamEndX=ball.x+Math.cos(angle)*beamLen*0.6;
        const beamEndY=ball.y+Math.sin(angle)*beamLen*0.6;
        FX.voidBeam={x:ball.x,y:ball.y,angle,life:120,max:120,ownerId:ball.id};
        burst(ball.x,ball.y,'#7700ff',28);
        G.arenaFlash.color='#4400aa'; G.arenaFlash.alpha=0.4;
        CAM.setFollow(beamEndX, beamEndY);
        // After beam travels, show impact at beam midpoint
        setTimeout(()=>CAM.impact(beamEndX,beamEndY,'#7700ff','VOID HIT!'),600);
      } break;

    case 'sandevistan':
      // Camera follows the owner as they blitz around
      FX.sandevistanFrames=240; FX.sandevistanOwner=ball.id;
      ball.rage=240;
      { const s=Math.hypot(ball.vx,ball.vy)||ball.baseSpd;
        ball.vx=ball.vx/s*s*4; ball.vy=ball.vy/s*s*4; }
      burst(ball.x,ball.y,'#00ffff',20);
      CAM.setFollow(ball.x, ball.y, ball.id); // followBallId tracks owner moving
      // Impact fires after ~0.3s once they've blitzed past someone
      setTimeout(()=>{ const b2=G.balls.find(b=>b.id===ball.id); if(b2) CAM.impact(b2.x,b2.y,'#00ffff','SANDEVISTAN!',ball.id); },300);
      break;

    case 'timestop':
      // Camera pans to center to show the golden freeze zone
      FX.timestopFrames=180; FX.timestopOwner=ball.id;
      burst(ball.x,ball.y,'#ffd700',20);
      G.arenaFlash.color='#ffd700'; G.arenaFlash.alpha=0.25;
      CAM.setFollow(ACX, ACY);
      setTimeout(()=>CAM.impact(ACX,ACY,'#ffd700','TIME STOP!'),350);
      break;

    case 'rewind':
      // Snap back to old position — camera follows to the new (old) position
      { const snap=FX.rewindGhosts.length>0?FX.rewindGhosts[0]:null;
        if(snap){
          const old=snap.find(s=>s.id===ball.id);
          if(old){
            const destX=old.x, destY=old.y;
            CAM.setFollow(destX, destY);
            ball.x=destX; ball.y=destY; ball.hp=Math.min(ball.max,old.hp+2);
            setTimeout(()=>CAM.impact(destX,destY,'#cc00ff','REWOUND!'),300);
          }
        } else {
          CAM.setFollow(ball.x, ball.y);
        }
        burst(ball.x,ball.y,'#cc00ff',24);
        G.arenaFlash.color='#cc00ff'; G.arenaFlash.alpha=0.3;
        for(let gi=0;gi<6;gi++) FX.ekkoGhosts.push({x:ball.x+Math.random()*60-30,y:ball.y+Math.random()*60-30,color:'#cc00ff',life:30,max:30});
      } break;

    case 'toji_chain':
      // Chain to all enemies — camera follows to the first target
      { const targets=G.balls.filter(b=>b.alive&&isEnemy(ball,b));
        let firstTarget=null;
        targets.forEach((t,idx)=>{
          FX.chains.push({x1:ball.x,y1:ball.y,x2:t.x,y2:t.y,
            life:50,max:50,ownerId:ball.id,targetId:t.id,type:'toji'});
          t.hit(); addDmg(ball,25);
          if(idx===0) firstTarget=t;
        });
        burst(ball.x,ball.y,'#c0c0c0',16);
        G.shakeFrames=18; G.shakeAmt=14;
        if(firstTarget){
          const ftid=firstTarget.id, ftlen=targets.length;
          CAM.setFollow(firstTarget.x, firstTarget.y, firstTarget.id);
          setTimeout(()=>{ const bt=G.balls.find(b=>b.id===ftid); if(bt) CAM.impact(bt.x,bt.y,'#c0c0c0',ftlen>1?`${ftlen} HIT!`:'HIT!',ftid); },350);
        }
      } break;

    case 'ekko_ult':
      // Teleport to old position + explosion — camera follows to landing spot
      { const snap=FX.rewindGhosts.length>0?FX.rewindGhosts[0]:null;
        const oldPos=snap?.find(s=>s.id===ball.id);
        const lx=oldPos?oldPos.x:ball.x, ly=oldPos?oldPos.y:ball.y;
        FX.ekkoGhosts.push({x:ball.x,y:ball.y,color:ball.color,life:60,max:60});
        ball.x=lx; ball.y=ly;
        ball.hp=Math.min(ball.max,ball.hp+3);
        FX.explosions.push({x:lx,y:ly,r:0,maxR:140,life:30,max:30,color:'#00ff88'});
        let hitCount=0;
        G.balls.forEach(b=>{ if(b.alive&&isEnemy(ball,b)){
          const dx=b.x-lx,dy=b.y-ly,d=Math.hypot(dx,dy);
          if(d<140){ b.hit(); b.vx+=dx/(d||1)*10; b.vy+=dy/(d||1)*10; addDmg(ball,25); hitCount++; }
        }});
        burst(lx,ly,'#00ff88',28);
        G.shakeFrames=25; G.shakeAmt=18;
        G.arenaFlash.color='#00ff88'; G.arenaFlash.alpha=0.35;
        CAM.setFollow(lx, ly, ball.id);
        setTimeout(()=>{ const bk=G.balls.find(b=>b.id===ball.id); if(bk) CAM.impact(bk.x,bk.y,'#00ff88', hitCount>0?'CHRONOBREAK!':'BLINK!',ball.id); },250);
      } break;

    case 'prison':
      // Trap a random enemy — camera follows to the trapped ball
      { const targets=G.balls.filter(b=>b.alive&&isEnemy(ball,b));
        if(targets.length>0){
          const t=targets[Math.floor(Math.random()*targets.length)];
          FX.prisonTarget=t.id; FX.prisonFrames=180;
          burst(t.x,t.y,'#ff6600',20);
          G.arenaFlash.color='#ff6600'; G.arenaFlash.alpha=0.25;
          const tid2=t.id;
          CAM.setFollow(t.x, t.y, t.id);
          setTimeout(()=>{ const bt=G.balls.find(b=>b.id===tid2); if(bt) CAM.impact(bt.x,bt.y,'#ff6600','TRAPPED!',tid2); },350);
        }
      } break;

    case 'portal':
      // Teleport next to the nearest enemy and launch toward them
      { const enemies = G.balls.filter(b=>b.alive&&isEnemy(ball,b));
        if(enemies.length > 0){
          // Find nearest enemy
          let nearest = enemies[0], nearDist = Infinity;
          enemies.forEach(e=>{ const d=Math.hypot(e.x-ball.x,e.y-ball.y); if(d<nearDist){nearDist=d;nearest=e;} });
          // Teleport just behind the target (offset so we don't overlap)
          const ang = Math.atan2(ball.y-nearest.y, ball.x-nearest.x); // approach from behind
          const tx = nearest.x + Math.cos(ang) * (nearest.r + ball.r + 8);
          const ty = nearest.y + Math.sin(ang) * (nearest.r + ball.r + 8);
          // Keep inside arena
          const distFromCenter = Math.hypot(tx-ACX, ty-ACY);
          const clampR = Math.min(1, (AR-ball.r-4)/Math.max(1,distFromCenter));
          const ftx = distFromCenter>AR-ball.r-4 ? ACX+(tx-ACX)*clampR : tx;
          const fty = distFromCenter>AR-ball.r-4 ? ACY+(ty-ACY)*clampR : ty;
          // Portals FX
          FX.portals.push({x:ball.x,y:ball.y,life:60,color:'#00ff44',type:'out'});
          FX.portals.push({x:ftx,y:fty,life:60,color:'#00ff44',type:'in'});
          burst(ball.x,ball.y,'#00ff44',16);
          burst(ftx,fty,'#00ff44',16);
          ball.x=ftx; ball.y=fty;
          // Launch toward the target
          const toEnemy = Math.atan2(nearest.y-fty, nearest.x-ftx);
          const spd = Math.max(Math.hypot(ball.vx,ball.vy), ball.baseSpd*1.5);
          ball.vx = Math.cos(toEnemy)*spd;
          ball.vy = Math.sin(toEnemy)*spd;
          CAM.setFollow(ftx, fty, ball.id);
          const eid = nearest.id;
          setTimeout(()=>{ const bt=G.balls.find(b=>b.id===eid); if(bt) CAM.impact(bt.x,bt.y,'#00ff44','PORTAL!',eid); },250);
        }
      } break;

    // ══════════════════════════════════════
    // BLACK CLOVER ABILITIES
    // ══════════════════════════════════════

          G.arenaFlash.color='#880000'; G.arenaFlash.alpha=0.4;
          CAM.setFollow(ball.x,ball.y,ball.id);
          const tid=t.id;
          setTimeout(()=>{ const bt=G.balls.find(b=>b.id===tid); if(bt) CAM.impact(bt.x,bt.y,'#cc0000','ZAFKIEL!',tid); },400);
        }
      } break;

    case 'sandalphon':
      { FX.sandalphonCrash={x:ACX,y:ACY,r:0,maxR:AR*0.85,life:40,max:40,ownerId:ball.id};
        G.balls.forEach(b=>{ if(!b.alive||!isEnemy(ball,b)) return;
          b.hit(); b.hit(); const dx=b.x-ACX,dy=b.y-ACY,d=Math.hypot(dx,dy)||1; b.vx+=dx/d*16; b.vy+=dy/d*16; addDmg(ball,45);
        });
        burst(ACX,ACY,'#ffcc00',40); burst(ACX,ACY,'#ffffff',20);
        G.arenaFlash.color='#ffee44'; G.arenaFlash.alpha=0.8;
        G.shakeFrames=45; G.shakeAmt=35;
        CAM.setFollow(ACX,ACY);
        setTimeout(()=>CAM.impact(ACX,ACY,'#ffcc00','SANDALPHON!!'),200);
      } break;

    case 'origami_angel':
      { for(let i=0;i<20;i++){
          const a=Math.random()*Math.PI*2;
          const r=Math.random()*AR*0.9;
          FX.origamiFeathers.push({x:ACX+Math.cos(a)*r,y:ACY-AR,vx:(Math.random()-0.5)*2,vy:8+Math.random()*8,life:35,max:35,ownerId:ball.id});
        }
        burst(ACX,ACY-AR*0.5,'#ffffff',30); burst(ACX,ACY-AR*0.5,'#ccddff',20);
        G.arenaFlash.color='#ccddff'; G.arenaFlash.alpha=0.5;
        G.shakeFrames=25; G.shakeAmt=18;
        CAM.setFollow(ACX,ACY);
        setTimeout(()=>CAM.impact(ACX,ACY,'#ffffff','METATRON!'),300);
      } break;

    case 'shido_seal':
      { FX.shidoWave={x:ball.x,y:ball.y,r:0,maxR:220,life:35,max:35,ownerId:ball.id};
        G.balls.forEach(b=>{ if(!b.alive||!isEnemy(ball,b)) return;
          const dx=ball.x-b.x,dy=ball.y-b.y,d=Math.hypot(dx,dy)||1;
          b.vx+=dx/d*10; b.vy+=dy/d*10; addDmg(ball,15);
        });
        burst(ball.x,ball.y,'#ff88cc',28); burst(ball.x,ball.y,'#ffffff',14);
        G.arenaFlash.color='#ff88cc'; G.arenaFlash.alpha=0.45;
        G.shakeFrames=15; G.shakeAmt=10;
        CAM.setFollow(ball.x,ball.y,ball.id);
        setTimeout(()=>{ const bk=G.balls.find(b=>b.id===ball.id); if(bk) CAM.impact(bk.x,bk.y,'#ff88cc','SEALING KISS!',ball.id); },300);
      } break;

    case 'miku_gabriel':
      { FX.mikusonic={ownerId:ball.id,life:200,max:200,r:0,angle:0};
        G.balls.forEach(b=>{ if(!b.alive||!isEnemy(ball,b)) return;
          const d=Math.hypot(b.x-ball.x,b.y-ball.y);
          if(d<AR){ b.hit(); const nx=(b.x-ball.x)/(d||1),ny=(b.y-ball.y)/(d||1); b.vx+=nx*12; b.vy+=ny*12; addDmg(ball,20); }
        });
        burst(ball.x,ball.y,'#cc44ff',28); burst(ball.x,ball.y,'#ff88ff',14);
        G.arenaFlash.color='#9922ff'; G.arenaFlash.alpha=0.5;
        G.shakeFrames=30; G.shakeAmt=22;
        CAM.setFollow(ball.x,ball.y,ball.id);
        setTimeout(()=>{ const bk=G.balls.find(b=>b.id===ball.id); if(bk) CAM.impact(bk.x,bk.y,'#cc44ff','GABRIEL!!',ball.id); },250);
      } break;

    case 'arena_chaos':
      // Chaos gravity — gravity direction rotates for 5 seconds
      ARENA.chaosFrames = 300; ARENA.chaosAngle = Math.random()*Math.PI*2;
      burst(ACX, ACY, '#aa44ff', 28);
      G.arenaFlash.color='#6600cc'; G.arenaFlash.alpha=0.4;
      G.shakeFrames=18; G.shakeAmt=14;
      CAM.setFollow(ACX, ACY);
      setTimeout(()=>CAM.impact(ACX,ACY,'#aa44ff','CHAOS!'),250);
      break;
  }
}

// ════════════════════════════════════════════════
// DRAW: CINEMATIC MOMENT OVERLAY
// ════════════════════════════════════════════════
function drawCinematic(ctx){
  if(!CAM.active) return;
  const phase=CAM.phase;

  // ── Always: dark vignette around focus point ──
  const fadeAlpha = phase==='fadeout' ? Math.max(0,1-CAM.timer/40) : 1;
  const vigR=ctx.createRadialGradient(CAM.focX,CAM.focY,60,CAM.focX,CAM.focY,AR*1.1);
  vigR.addColorStop(0,'rgba(0,0,0,0)');
  vigR.addColorStop(1,`rgba(0,0,0,${0.5*fadeAlpha})`);
  ctx.fillStyle=vigR; ctx.fillRect(0,0,W,H);

  // ── Chromatic aberration edges ──
  ctx.globalAlpha=0.10*fadeAlpha;
  ctx.fillStyle='#ff0033'; ctx.fillRect(0,0,6,H); ctx.fillRect(W-6,0,6,H);
  ctx.fillStyle='#0033ff'; ctx.fillRect(3,0,6,H); ctx.fillRect(W-12,0,6,H);
  ctx.globalAlpha=1;

  // ── Pickup phase: speed lines + card ──
  if(phase==='pickup'){
    const pt=Math.min(1,CAM.timer/55);

    // Speed lines burst from focus
    if(pt<0.7){
      const la=(pt<0.3?pt/0.3:1-(pt-0.3)/0.4)*0.65;
      ctx.globalAlpha=la;
      ctx.strokeStyle='#ffffff'; ctx.lineWidth=1.2;
      for(let li=0;li<24;li++){
        const a=Math.PI*2/24*li+(frame*0.01);
        const r1=50+li*3, r2=r1+60+li*2;
        ctx.beginPath();
        ctx.moveTo(CAM.focX+Math.cos(a)*r1, CAM.focY+Math.sin(a)*r1);
        ctx.lineTo(CAM.focX+Math.cos(a)*r2, CAM.focY+Math.sin(a)*r2);
        ctx.stroke();
      }
      ctx.globalAlpha=1;
    }

    // Colored flash ring expanding
    if(pt<0.4){
      const rr=(1-pt/0.4);
      ctx.globalAlpha=rr*0.6;
      ctx.strokeStyle=CAM.orbColor; ctx.lineWidth=6;
      ctx.beginPath(); ctx.arc(CAM.focX,CAM.focY,(1-rr)*120,0,Math.PI*2); ctx.stroke();
      ctx.globalAlpha=1;
    }
  }


  // ── Follow phase: tracking reticle on follow target ──
  if(phase==='follow'){
    const ft=CAM.timer/90;
    const pulse=0.5+0.5*Math.sin(frame*0.25);
    // Targeting brackets
    ctx.globalAlpha=(0.5+0.3*pulse)*fadeAlpha;
    ctx.strokeStyle=CAM.orbColor; ctx.lineWidth=2.5;
    const sz=38, bsz=14;
    const tx=CAM.followX, ty=CAM.followY;
    // 4 corner brackets
    [[1,1],[1,-1],[-1,1],[-1,-1]].forEach(([sx,sy])=>{
      ctx.beginPath();
      ctx.moveTo(tx+sx*sz,ty+sy*(sz-bsz)); ctx.lineTo(tx+sx*sz,ty+sy*sz); ctx.lineTo(tx+sx*(sz-bsz),ty+sy*sz);
      ctx.stroke();
    });
    // Center crosshair dot
    ctx.globalAlpha=0.7*fadeAlpha;
    ctx.fillStyle=CAM.orbColor;
    ctx.beginPath(); ctx.arc(tx,ty,4,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
  }

  // ── Impact flash ──
  if(CAM.impactAlpha>0){
    ctx.globalAlpha=CAM.impactAlpha*0.35;
    ctx.fillStyle=CAM.impactColor; ctx.fillRect(0,0,W,H);
    ctx.globalAlpha=1;
  }

  // ── Result text (HIT! / MISS! etc) ──
  if(CAM.resultText && CAM.resultTimer>0){
    const rt=CAM.resultTimer/70;
    const scale=rt>0.8?(1+(1-rt)*0.5):1;
    ctx.save();
    ctx.translate(CAM.tgtX, CAM.tgtY-70);
    ctx.scale(scale,scale);
    ctx.globalAlpha=rt;
    ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.font='bold 44px Rajdhani, Courier New';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(CAM.resultText,2,2);
    ctx.fillStyle=CAM.impactColor;
    ctx.fillText(CAM.resultText,0,0);
    ctx.restore();
  }

  ctx.globalAlpha=1;
}

function drawFX(ctx, frame){
  // ── Sandevistan world tint ──
  if(FX.sandevistanFrames>0){
    const sf=FX.sandevistanFrames/240;
    // Dark blue tint
    ctx.globalAlpha=0.22*sf;
    ctx.fillStyle='#001133';
    ctx.beginPath(); ctx.arc(ACX,ACY,AR,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
    // Cyan matrix rain lines
    ctx.save();
    ctx.beginPath(); ctx.arc(ACX,ACY,AR,0,Math.PI*2); ctx.clip();
    const pulse=0.5+0.5*Math.sin(frame*0.25);
    for(let li=0;li<18;li++){
      const lx=ACX-AR+li*(AR*2/17);
      const offset=((frame*4+li*37)%280);
      ctx.globalAlpha=0.18*sf*pulse;
      ctx.strokeStyle='#00ffff'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(lx,ACY-AR+offset); ctx.lineTo(lx,ACY-AR+offset+60); ctx.stroke();
    }
    ctx.restore();
    ctx.globalAlpha=1;
    // Cyan scan line sweeping
    const scanY=ACY-AR+((frame*3)%(AR*2));
    ctx.globalAlpha=0.18*sf;
    ctx.strokeStyle='#00ffff'; ctx.lineWidth=2;
    ctx.save();
    ctx.beginPath(); ctx.arc(ACX,ACY,AR,0,Math.PI*2); ctx.clip();
    ctx.beginPath(); ctx.moveTo(ACX-AR,scanY); ctx.lineTo(ACX+AR,scanY); ctx.stroke();
    ctx.restore();
    // Pulsing edge ring
    ctx.globalAlpha=(0.18+0.14*pulse)*sf;
    ctx.strokeStyle='#00ffff'; ctx.lineWidth=8;
    ctx.beginPath(); ctx.arc(ACX,ACY,AR-4,0,Math.PI*2); ctx.stroke();
    ctx.globalAlpha=1;
  }

  // ── Timestop golden zone ──
  if(FX.timestopFrames>0){
    const tp=FX.timestopFrames/180;
    // Golden vignette
    const tsGrad=ctx.createRadialGradient(ACX,ACY,AR*0.3,ACX,ACY,AR);
    tsGrad.addColorStop(0,'rgba(255,215,0,0)');
    tsGrad.addColorStop(1,`rgba(255,180,0,${0.22*tp})`);
    ctx.fillStyle=tsGrad;
    ctx.beginPath(); ctx.arc(ACX,ACY,AR,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
    // Frozen crack lines radiating from center
    ctx.save();
    ctx.translate(ACX,ACY);
    ctx.globalAlpha=0.28*tp;
    ctx.strokeStyle='#ffe566'; ctx.lineWidth=1.5;
    for(let ci=0;ci<16;ci++){
      const a=ci*Math.PI/8;
      const len=(80+Math.sin(ci*2.3)*60)*tp;
      ctx.beginPath(); ctx.moveTo(0,0);
      ctx.lineTo(Math.cos(a)*len*0.3,Math.sin(a)*len*0.3);
      ctx.lineTo(Math.cos(a+0.15)*(len*0.6),Math.sin(a+0.15)*(len*0.6));
      ctx.lineTo(Math.cos(a)*len,Math.sin(a)*len);
      ctx.stroke();
    }
    // Spinning outer ring (frozen slowly)
    ctx.rotate(frame*0.003);
    ctx.globalAlpha=0.35*tp;
    ctx.strokeStyle='#ffd700'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(0,0,AR-8,0,Math.PI*2); ctx.stroke();
    // Clock hands (stopped)
    ctx.globalAlpha=0.5*tp;
    ctx.strokeStyle='#fff4aa'; ctx.lineWidth=4; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0,-(AR*0.5)); ctx.stroke(); // hour
    ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(AR*0.35,AR*0.12); ctx.stroke(); // minute
    // 12 tick marks
    ctx.globalAlpha=0.4*tp;
    ctx.strokeStyle='#ffd700'; ctx.lineWidth=2;
    for(let ti=0;ti<12;ti++){
      const a=ti*Math.PI/6;
      ctx.beginPath();
      ctx.moveTo(Math.cos(a)*(AR-22),Math.sin(a)*(AR-22));
      ctx.lineTo(Math.cos(a)*(AR-10),Math.sin(a)*(AR-10));
      ctx.stroke();
    }
    ctx.lineCap='butt';
    ctx.restore();
    ctx.globalAlpha=1;
  }

  // ── Prison cage ──
  if(FX.prisonFrames>0 && FX.prisonTarget>=0){
    const prisoner=G.balls.find(b=>b.id===FX.prisonTarget);
    if(prisoner){
      const px=prisoner.x, py=prisoner.y, sz=54;
      const pp=0.5+0.5*Math.sin(frame*0.15);
      const pf=FX.prisonFrames/180;
      // Fiery floor glow
      const pgrd=ctx.createRadialGradient(px,py+sz,0,px,py,sz*1.4);
      pgrd.addColorStop(0,`rgba(255,120,0,${0.22*pf})`);
      pgrd.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=pgrd;
      ctx.fillRect(px-sz*1.5,py-sz*1.5,sz*3,sz*3);
      // 8 vertical energy bars
      for(let bi=0;bi<8;bi++){
        const a=bi*Math.PI/4;
        const bx=px+Math.cos(a)*sz*0.85;
        const barAlpha=(0.65+0.25*pp)*pf;
        // Bar glow
        ctx.globalAlpha=barAlpha*0.4;
        ctx.strokeStyle='#ffaa33'; ctx.lineWidth=8;
        ctx.beginPath(); ctx.moveTo(bx,py-sz); ctx.lineTo(bx,py+sz); ctx.stroke();
        // Bar core
        ctx.globalAlpha=barAlpha;
        ctx.strokeStyle='#ff6600'; ctx.lineWidth=2.5;
        ctx.beginPath(); ctx.moveTo(bx,py-sz); ctx.lineTo(bx,py+sz); ctx.stroke();
      }
      ctx.globalAlpha=1;
      // Top ring
      ctx.strokeStyle=`rgba(255,90,0,${(0.9+0.1*pp)*pf})`; ctx.lineWidth=4;
      ctx.beginPath(); ctx.ellipse(px,py-sz,sz*0.85,12,0,0,Math.PI*2); ctx.stroke();
      // Bottom ring
      ctx.beginPath(); ctx.ellipse(px,py+sz,sz*0.85,12,0,0,Math.PI*2); ctx.stroke();
      // Spinning energy ring mid
      ctx.save(); ctx.translate(px,py); ctx.rotate(frame*0.06);
      ctx.globalAlpha=(0.4+0.3*pp)*pf;
      ctx.strokeStyle='#ffcc44'; ctx.lineWidth=2;
      ctx.setLineDash([10,6]);
      ctx.beginPath(); ctx.ellipse(0,0,sz*0.85,14,0,0,Math.PI*2); ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();
      // Inner orange glow
      ctx.globalAlpha=(0.10+0.05*pp)*pf;
      ctx.fillStyle='#ff6600';
      ctx.beginPath(); ctx.ellipse(px,py,sz*0.8,sz,0,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=1;
      // Ember particles rising
      if(frame%3===0){
        parts.push({x:px+(Math.random()*2-1)*sz*0.7,y:py+sz,vx:(Math.random()-0.5)*0.8,vy:-2.5-Math.random()*2,r:2+Math.random()*2,color:Math.random()<0.5?'#ff8833':'#ffcc44',life:40,max:40});
      }
    }
  }

  // ── Gojo Purple Void Beam ──
  if(FX.voidBeam){
    const bm=FX.voidBeam;
    const prog=bm.life/bm.max;
    const len=AR*2.2;
    const ex=bm.x+Math.cos(bm.angle)*len, ey=bm.y+Math.sin(bm.angle)*len;
    const shimmer=0.6+0.4*Math.sin(frame*0.4);
    // Wide outer purple glow
    ctx.globalAlpha=prog*0.25;
    ctx.strokeStyle='#5500bb'; ctx.lineWidth=70;
    ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(bm.x,bm.y); ctx.lineTo(ex,ey); ctx.stroke();
    // Mid purple
    ctx.globalAlpha=prog*0.5;
    ctx.strokeStyle='#9922ff'; ctx.lineWidth=38;
    ctx.beginPath(); ctx.moveTo(bm.x,bm.y); ctx.lineTo(ex,ey); ctx.stroke();
    // Black void core
    ctx.globalAlpha=prog*0.98;
    ctx.strokeStyle='#000000'; ctx.lineWidth=22;
    ctx.beginPath(); ctx.moveTo(bm.x,bm.y); ctx.lineTo(ex,ey); ctx.stroke();
    // Inner white-hot thread
    ctx.globalAlpha=prog*0.85*shimmer;
    ctx.strokeStyle='#ffffff'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(bm.x,bm.y); ctx.lineTo(ex,ey); ctx.stroke();
    // Magenta crackle edges
    ctx.strokeStyle='#ff44ff'; ctx.lineWidth=1.5;
    ctx.globalAlpha=prog*shimmer*0.9;
    ctx.setLineDash([4,8]);
    ctx.beginPath(); ctx.moveTo(bm.x,bm.y); ctx.lineTo(ex,ey); ctx.stroke();
    ctx.setLineDash([]);
    // Distortion particles along beam
    if(frame%2===0){
      const t=Math.random();
      const bpx=bm.x+Math.cos(bm.angle)*len*t;
      const bpy=bm.y+Math.sin(bm.angle)*len*t;
      parts.push({x:bpx+(Math.random()-0.5)*20,y:bpy+(Math.random()-0.5)*20,vx:(Math.random()-0.5)*2,vy:(Math.random()-0.5)*2,r:2+Math.random()*3,color:Math.random()<0.5?'#aa00ff':'#ff00ff',life:20,max:20});
    }
    ctx.lineCap='butt';
    ctx.globalAlpha=1;
  }

  // ── Toji chains / Gojo Blue pull ──
  for(const c of FX.chains){
    const p=c.life/c.max;
    if(c.type==='toji'){
      const dx=c.x2-c.x1, dy=c.y2-c.y1;
      const len=Math.hypot(dx,dy)||1;
      const nx=dy/len, ny=-dx/len; // perpendicular
      // Chain glow
      ctx.globalAlpha=p*0.35;
      ctx.strokeStyle='#aaaaaa'; ctx.lineWidth=9;
      ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(c.x1,c.y1); ctx.lineTo(c.x2,c.y2); ctx.stroke();
      // Draw chain links
      const linkCount=Math.floor(len/14);
      for(let li=0;li<=linkCount;li++){
        const t2=li/Math.max(1,linkCount);
        const lx=c.x1+dx*t2, ly=c.y1+dy*t2;
        ctx.globalAlpha=p*(0.7+0.3*(li%2));
        ctx.strokeStyle=li%2===0?'#cccccc':'#888888'; ctx.lineWidth=2.5;
        ctx.beginPath();
        ctx.ellipse(lx,ly,6,3,Math.atan2(dy,dx),0,Math.PI*2);
        ctx.stroke();
      }
      ctx.lineCap='butt';
      // Blade tip at target
      const tipAngle=Math.atan2(dy,dx);
      ctx.save(); ctx.translate(c.x2,c.y2); ctx.rotate(tipAngle);
      ctx.globalAlpha=p;
      ctx.fillStyle='#ffffff';
      ctx.beginPath(); ctx.moveTo(12,0); ctx.lineTo(-4,6); ctx.lineTo(-4,-6); ctx.closePath(); ctx.fill();
      ctx.fillStyle='#cccccc';
      ctx.beginPath(); ctx.moveTo(12,0); ctx.lineTo(4,3); ctx.lineTo(4,-3); ctx.closePath(); ctx.fill();
      ctx.restore();
    } else if(c.type==='blue_pull'){
      // Blue pull — energy tether with flowing dots
      ctx.globalAlpha=p*0.3;
      ctx.strokeStyle='#0066ff'; ctx.lineWidth=8;
      ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(c.x1,c.y1); ctx.lineTo(c.x2,c.y2); ctx.stroke();
      ctx.globalAlpha=p*0.7;
      ctx.strokeStyle='#44aaff'; ctx.lineWidth=2;
      ctx.setLineDash([8,6]);
      ctx.lineDashOffset=-frame*3;
      ctx.beginPath(); ctx.moveTo(c.x1,c.y1); ctx.lineTo(c.x2,c.y2); ctx.stroke();
      ctx.setLineDash([]); ctx.lineDashOffset=0;
      ctx.lineCap='butt';
    }
    ctx.globalAlpha=1;
  }

  // ── Explosions (Red/Ekko) ──
  for(const e of FX.explosions){
    const p=e.life/e.max;
    // Wide outer shockwave
    ctx.globalAlpha=p*0.2;
    ctx.strokeStyle=e.color; ctx.lineWidth=18;
    ctx.beginPath(); ctx.arc(e.x,e.y,e.r,0,Math.PI*2); ctx.stroke();
    // Mid ring
    ctx.globalAlpha=p*0.55;
    ctx.lineWidth=5;
    ctx.beginPath(); ctx.arc(e.x,e.y,e.r*0.75,0,Math.PI*2); ctx.stroke();
    // Inner bright ring
    ctx.globalAlpha=p*0.9;
    ctx.lineWidth=3;
    ctx.strokeStyle='#ffffff';
    ctx.beginPath(); ctx.arc(e.x,e.y,e.r*0.4,0,Math.PI*2); ctx.stroke();
    // Fill
    ctx.globalAlpha=p*0.12;
    ctx.fillStyle=e.color;
    ctx.beginPath(); ctx.arc(e.x,e.y,e.r,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
  }

  // ── Portals ──
  for(const po of FX.portals){
    const p=po.life/60;
    const pulse=0.5+0.5*Math.sin(frame*0.25);
    const dir=po.type==='in'?1:-1;
    ctx.save();
    ctx.translate(po.x,po.y);
    // Outer glow halo
    ctx.globalAlpha=p*0.2;
    ctx.fillStyle=po.color;
    ctx.beginPath(); ctx.arc(0,0,52,0,Math.PI*2); ctx.fill();
    // Rotating outer segments
    ctx.rotate(frame*0.06*dir);
    ctx.globalAlpha=p*(0.7+0.25*pulse);
    ctx.strokeStyle=po.color; ctx.lineWidth=4;
    ctx.setLineDash([12,8]);
    ctx.beginPath(); ctx.arc(0,0,34,0,Math.PI*2); ctx.stroke();
    ctx.setLineDash([]);
    // Counter-rotating inner ring
    ctx.rotate(-frame*0.12*dir);
    ctx.globalAlpha=p*0.9;
    ctx.strokeStyle='#ffffff'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(0,0,22,0,Math.PI*2); ctx.stroke();
    // Spiral arms (3)
    ctx.rotate(frame*0.08*dir);
    for(let si=0;si<3;si++){
      const sa=si*Math.PI*2/3;
      ctx.globalAlpha=p*0.7;
      ctx.strokeStyle=po.color; ctx.lineWidth=2.5;
      ctx.lineCap='round';
      ctx.beginPath();
      ctx.moveTo(Math.cos(sa)*22,Math.sin(sa)*22);
      ctx.quadraticCurveTo(Math.cos(sa+0.9)*14,Math.sin(sa+0.9)*14,0,0);
      ctx.stroke();
    }
    ctx.lineCap='butt';
    // Black void center
    ctx.globalAlpha=p;
    ctx.fillStyle='#000000';
    ctx.beginPath(); ctx.arc(0,0,14,0,Math.PI*2); ctx.fill();
    // Bright core

      ctx.strokeStyle='#ffffff'; ctx.lineWidth=2; ctx.globalAlpha=rp*0.4;
      ctx.beginPath(); ctx.arc(st.x,st.y,rg.r*0.9,0,Math.PI*2); ctx.stroke();
      if(frame%3===0){
        const a=Math.random()*Math.PI*2;
        parts.push({x:st.x+Math.cos(a)*rg.r,y:st.y+Math.sin(a)*rg.r,
          vx:Math.cos(a)*5,vy:Math.sin(a)*5,r:7,color:'#ffdd44',life:16,max:16});
      }
    }
    ctx.globalAlpha=1;
  }

  // ── Frieren Allmächtig ──
  if(FX.frierenEnd){
    const fe=FX.frierenEnd, prog=fe.life/fe.max;
    // Expanding ice-blue ring
    ctx.globalAlpha=prog*0.6;
    ctx.strokeStyle='#cceeff'; ctx.lineWidth=10;
    ctx.beginPath(); ctx.arc(fe.x,fe.y,fe.r,0,Math.PI*2); ctx.stroke();
    ctx.strokeStyle='#88bbff'; ctx.lineWidth=4; ctx.globalAlpha=prog*0.35;
    ctx.beginPath(); ctx.arc(fe.x,fe.y,fe.r*0.75,0,Math.PI*2); ctx.stroke();
    // Shards
    for(const sh of fe.shards){
      if(sh.hit||sh.life<=0) continue;
      const sp=sh.life/sh.max;
      ctx.globalAlpha=sp*0.9;
      ctx.save(); ctx.translate(sh.x,sh.y); ctx.rotate(sh.life*0.15);
      ctx.fillStyle='#cceeff';
      ctx.beginPath(); ctx.moveTo(0,-12); ctx.lineTo(6,0); ctx.lineTo(0,12); ctx.lineTo(-6,0); ctx.closePath(); ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.6)';
      ctx.beginPath(); ctx.moveTo(0,-8); ctx.lineTo(3,0); ctx.lineTo(0,8); ctx.lineTo(-3,0); ctx.closePath(); ctx.fill();
      ctx.restore();
      if(frame%3===0) parts.push({x:sh.x,y:sh.y,vx:(Math.random()-0.5)*3,vy:(Math.random()-0.5)*3,r:4,color:'#aaddff',life:14,max:14});
    }
    ctx.globalAlpha=1;
  }
}

function drawOrbs(ctx, frame){
  for(const o of orbs){
    const alpha=o.life<60?o.life/60:1;
    const pulse=0.5+0.5*Math.sin(o.pulse);
    ctx.globalAlpha=alpha*(0.7+0.3*pulse);
    // Outer glow ring
    ctx.fillStyle=o.type.color+'44';
    ctx.beginPath(); ctx.arc(o.x,o.y,ORB_RADIUS+8+pulse*6,0,Math.PI*2); ctx.fill();
    // Inner circle
    ctx.fillStyle=o.type.color+'cc';
    ctx.beginPath(); ctx.arc(o.x,o.y,ORB_RADIUS,0,Math.PI*2); ctx.fill();
    // Emoji
    ctx.globalAlpha=alpha;
    ctx.font=`${ORB_RADIUS+4}px serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(o.type.emoji, o.x, o.y);
    // Name label below
    ctx.fillStyle=o.type.color;
    ctx.font='bold 11px Rajdhani, Courier New';
    ctx.fillText(o.type.name, o.x, o.y+ORB_RADIUS+12);
    ctx.globalAlpha=1;
  }
}

// ── Arena state (modified by arena powers) ──
// ── Arena shape system ──
// shapes: 'circle','square','triangle','pentagon','hexagon','diamond'
const ARENA_SHAPES = ['circle','circle','circle','square','triangle','pentagon','hexagon','diamond'];

// Returns polygon vertices for a regular n-gon inscribed in radius r, centered at (cx,cy)
// angleOffset rotates the whole shape
function polyVerts(cx, cy, r, n, angleOffset=0){
  const pts=[];
  for(let i=0;i<n;i++){
    const a=angleOffset + (Math.PI*2/n)*i - Math.PI/2;
    pts.push({x:cx+Math.cos(a)*r, y:cy+Math.sin(a)*r});
  }
  return pts;
}

// Draw any arena shape as a canvas path
function arenaPath(ctx, r){
  ctx.beginPath();
  if(ARENA.shape==='circle'){
    ctx.arc(ACX,ACY,r,0,Math.PI*2);
  } else {
    const verts=ARENA.getVerts(r);
    ctx.moveTo(verts[0].x,verts[0].y);
    for(let i=1;i<verts.length;i++) ctx.lineTo(verts[i].x,verts[i].y);
    ctx.closePath();
  }
}

// Push a ball inside the current arena boundary and reflect velocity
function pushInsideArena(b, radius){
  if(ARENA.shape==='circle'){
    const dist=Math.hypot(b.x-ACX,b.y-ACY);
    const lim=radius-b.r;
    if(dist>lim){
      const nx=(b.x-ACX)/(dist||1), ny=(b.y-ACY)/(dist||1);
      b.x=ACX+nx*(lim-0.5); b.y=ACY+ny*(lim-0.5);
      const dot=b.vx*nx+b.vy*ny;
      if(dot>0){b.vx-=2*dot*nx; b.vy-=2*dot*ny;}
    }
  } else {
    // Polygon: find nearest edge, push inside and reflect
    const verts=ARENA.getVerts(radius);
    const n=verts.length;
    let minDist=Infinity, bestNx=0, bestNy=0, bestPx=b.x, bestPy=b.y;
    for(let i=0;i<n;i++){
      const a=verts[i], bv=verts[(i+1)%n];
      const ex=bv.x-a.x, ey=bv.y-a.y;
      const len=Math.hypot(ex,ey)||1;
      // Normal pointing inward (toward center)
      let inx=-ey/len, iny=ex/len;
      // Ensure normal points toward center
      const mx=(a.x+bv.x)/2-ACX, my=(a.y+bv.y)/2-ACY;
      if(inx*mx+iny*my > 0){ inx=-inx; iny=-iny; }
      // Signed distance from ball to this edge (positive = inside)
      const t=Math.max(0,Math.min(1,((b.x-a.x)*ex+(b.y-a.y)*ey)/(len*len)));
      const cx2=a.x+t*ex, cy2=a.y+t*ey;
      const dist2=Math.hypot(b.x-cx2,b.y-cy2);
      // Signed: negative = outside this edge
      const side=(b.x-cx2)*inx+(b.y-cy2)*iny;
      if(side<b.r && dist2<minDist){ minDist=dist2; bestNx=-inx; bestNy=-iny; bestPx=cx2; bestPy=cy2; }
    }
    // Check if ball is outside the polygon
    if(!isInsideArena(b.x,b.y,radius,b.r)){
      // Snap to closest edge point + reflect
      b.x=bestPx+(-bestNx)*(b.r+0.5); b.y=bestPy+(-bestNy)*(b.r+0.5);
      const dot=b.vx*bestNx+b.vy*bestNy;
      if(dot>0){b.vx-=2*dot*bestNx; b.vy-=2*dot*bestNy;}
    }
  }
}

// Returns true if point (px,py) is inside the arena with given radius (with optional margin)
function isInsideArena(px, py, radius, margin=0){
  if(ARENA.shape==='circle'){
    return Math.hypot(px-ACX,py-ACY) <= radius-margin;
  }
  // Polygon point-in-polygon (ray casting) + edge distance check
  const verts=ARENA.getVerts(radius);
  const n=verts.length;
  let inside=false;
  for(let i=0,j=n-1;i<n;j=i++){
    const xi=verts[i].x,yi=verts[i].y,xj=verts[j].x,yj=verts[j].y;
    if(((yi>py)!==(yj>py))&&(px<(xj-xi)*(py-yi)/(yj-yi)+xi)) inside=!inside;
  }
  if(!inside) return false;
  if(margin>0){
    // Also check distance to each edge >= margin
    for(let i=0;i<n;i++){
      const a=verts[i], bv=verts[(i+1)%n];
      const ex=bv.x-a.x, ey=bv.y-a.y;
      const len=Math.hypot(ex,ey)||1;
      const t=Math.max(0,Math.min(1,((px-a.x)*ex+(py-a.y)*ey)/(len*len)));
      const cx2=a.x+t*ex, cy2=a.y+t*ey;
      if(Math.hypot(px-cx2,py-cy2)<margin) return false;
    }
  }
  return true;
}

const ARENA = {
  r: AR,
  shape: 'circle',  // chosen randomly each match
  splitActive: false,
  splitAngle: 0,
  splitFrames: 0,
  chaosFrames: 0,
  chaosAngle: 0,
  shrinkFrames: 0,
  shrinkOwner: -1,
  getVerts(r){
    const s=this.shape;
    if(s==='square')   return polyVerts(ACX,ACY,r,4, Math.PI/4);
    if(s==='triangle') return polyVerts(ACX,ACY,r,3, 0);
    if(s==='pentagon') return polyVerts(ACX,ACY,r,5, 0);
    if(s==='hexagon')  return polyVerts(ACX,ACY,r,6, 0);
    if(s==='diamond')  return polyVerts(ACX,ACY,r,4, 0);
    return [];
  },
  reset(){
    this.r = AR;
    this.splitActive = false; this.splitFrames = 0;
    this.chaosFrames = 0;
    this.shrinkFrames = 0; this.shrinkOwner = -1;
  },
  pick(){
    this.shape = ARENA_SHAPES[Math.floor(Math.random()*ARENA_SHAPES.length)];
    this.r = AR;
  },
  tick(balls){
    if(this.splitFrames > 0) this.splitFrames--;
    else this.splitActive = false;

    if(this.chaosFrames > 0){
      this.chaosFrames--;
      this.chaosAngle += 0.04;
      for(const b of balls){
        if(!b.alive) continue;
        b.vx += Math.cos(this.chaosAngle) * 0.6;
        b.vy += Math.sin(this.chaosAngle) * 0.6;
      }
    }

    if(this.shrinkFrames > 0){
      this.shrinkFrames--;
      const minR = AR * 0.45;
      if(this.shrinkFrames > 240){
        this.r = Math.max(minR, this.r - 0.5);
      } else {
        this.r = Math.min(AR, this.r + 0.5);
      }
      for(const b of balls){
        if(!b.alive) continue;
        pushInsideArena(b, this.r);
      }
    } else if(this.r < AR){
      this.r = Math.min(AR, this.r + 0.5);
    }
  }
};

  // Overlord
  ainzZone: null,        // {x,y,r,life,max,ownerId}
  albedoShield: null,    // {ownerId,life,max,r}

  cocytusZone: null,     // {x,y,r,life,max,ownerId}
