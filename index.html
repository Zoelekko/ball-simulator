<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ball Simulator</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #040408;
      min-height: 100vh;
      display: flex;
      flex-direction: row;
      justify-content: center;
      align-items: flex-start;
      gap: 16px;
      padding: 12px;
      font-family: 'Rajdhani', 'Courier New', monospace;
    }
    #gameColumn { display: flex; flex-direction: column; align-items: center; }
    #displayCanvas {
      display: block; width: 540px; height: 960px;
      border-radius: 4px;
      box-shadow: 0 0 30px rgba(180,100,255,0.22), 0 0 60px rgba(100,200,255,0.10), 0 0 90px rgba(255,100,180,0.08);
    }
    #controls { display: flex; gap: 12px; margin: 12px 0 4px; }
    /* ── Performance panel ── */
    #perfPanel {
      width: 340px; height: 960px;
      background: rgba(8,6,18,0.95);
      border: 1px solid rgba(120,80,200,0.3);
      border-radius: 6px;
      display: flex; flex-direction: column;
      overflow: hidden;
      font-size: 12px;
      color: #aab;
    }
    #perfHeader {
      padding: 8px 12px;
      background: rgba(20,12,40,0.9);
      border-bottom: 1px solid rgba(120,80,200,0.2);
      font-weight: 700; font-size: 14px; color: #ccf;
      display: flex; justify-content: space-between; align-items: center;
    }
    #perfHeader button {
      background: rgba(255,60,60,0.2); border: 1px solid rgba(255,60,60,0.4);
      color: #f88; font-size: 11px; padding: 2px 10px; cursor: pointer;
      border-radius: 3px; font-family: inherit;
    }
    #perfStats {
      padding: 8px 12px;
      border-bottom: 1px solid rgba(120,80,200,0.15);
      display: grid; grid-template-columns: 1fr 1fr; gap: 4px 12px;
      font-size: 11px;
    }
    #perfStats .val { color: #8f8; font-weight: 700; }
    #perfStats .warn { color: #ff8; }
    #perfStats .bad { color: #f66; }
    #perfLog {
      flex: 1;
      overflow-y: auto;
      padding: 6px 10px;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      line-height: 1.5;
    }
    #perfLog .drop { color: #ff6644; }
    #perfLog .warn { color: #ffcc33; }
    #perfLog .info { color: #88aaff; }
    #perfLog .ok { color: #66cc88; }
    #perfLog .time { color: #666; margin-right: 6px; }
    .btn {
      padding: 10px 32px;
      background: linear-gradient(135deg, rgba(20,10,40,0.7), rgba(8,4,20,0.8));
      border: 1px solid transparent;
      background-clip: padding-box;
      color: #fff;
      font-family: inherit; font-size: 1rem; letter-spacing: 3px; font-weight: 700;
      cursor: pointer; border-radius: 3px;
      transition: all 0.2s; text-transform: uppercase;
      outline: 1px solid rgba(180,120,255,0.5);
      text-shadow: 0 0 10px rgba(200,150,255,0.8);
    }
    .btn:hover {
      outline-color: rgba(255,200,255,0.9);
      background: linear-gradient(135deg, rgba(80,20,120,0.5), rgba(40,10,80,0.6));
      color: #fff;
      box-shadow: 0 0 22px rgba(200,100,255,0.4);
    }
    .btn:disabled { opacity: 0.2; cursor: default; box-shadow: none; }
    #status { font-size: 0.72rem; letter-spacing: 2px; color: #556; min-height: 16px; font-weight: 600; }
    #status.rec  { color: #f44; text-shadow: 0 0 8px #f44; }
    #status.done { color: #4f8; text-shadow: 0 0 8px #4f8; }
  </style>
</head>
<body>
  <div id="gameColumn">
    <canvas id="displayCanvas" width="1080" height="1920"></canvas>
    <canvas id="recordCanvas"  width="1080" height="1920" style="display:none"></canvas>
    <div id="controls">
      <button class="btn" id="soloBtn">▶ Individual</button>
      <button class="btn" id="teamBtn">▶ Team</button>
      <button class="btn" id="bossBtn">☠ Boss Fight</button>
      <button class="btn" id="dungeonBtn">⚔ Dungeon</button>
      <button class="btn" id="autoBtn">⚡ Auto x10</button>
      <button class="btn" id="restartBtn" disabled>↺ Restart</button>
    </div>
    <div id="status">Press START</div>
  </div>

  <div id="perfPanel">
    <div id="perfHeader">
      <span>PERFORMANCE MONITOR</span>
      <button id="perfCopy">COPY</button>
      <button id="perfClear">CLEAR</button>
    </div>
    <div id="perfStats">
      <div>FPS: <span id="pFps" class="val">--</span></div>
      <div>Min: <span id="pFpsMin" class="val">--</span></div>
      <div>Particles: <span id="pParts" class="val">--</span></div>
      <div>FX active: <span id="pFx" class="val">--</span></div>
      <div>Balls alive: <span id="pBalls" class="val">--</span></div>
      <div>Arena R: <span id="pArena" class="val">--</span></div>
      <div>Frame: <span id="pFrame" class="val">--</span></div>
      <div>State: <span id="pState" class="val">--</span></div>
    </div>
    <div id="perfLog"></div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
